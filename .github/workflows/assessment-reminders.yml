name: Assessment Reminders

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  notify:
    name: Trigger Reminder Endpoint
    if: github.repository != 'joaogiacometti/notorium'
    runs-on: ubuntu-latest
    steps:
      - name: Skip when workflow secrets are not configured
        env:
          NOTORIUM_APP_URL: ${{ secrets.NOTORIUM_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$NOTORIUM_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Required secrets are not configured; skipping reminder trigger."
            exit 0
          fi

      - name: Trigger scheduled assessment reminders
        env:
          NOTORIUM_APP_URL: ${{ secrets.NOTORIUM_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${NOTORIUM_APP_URL%/}/api/notifications/assessments"
