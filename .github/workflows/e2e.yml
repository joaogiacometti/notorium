name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    if: github.repository == 'joaogiacometti/notorium'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notorium
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notorium
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      BETTER_AUTH_URL: http://127.0.0.1:3000
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      RATE_LIMIT_BACKEND: redis
      REDIS_URL: redis://localhost:6379
      USER_AI_SETTINGS_ENCRYPTION_KEY: ${{ secrets.USER_AI_SETTINGS_ENCRYPTION_KEY }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_EMAIL_PREFIX: e2e-
      E2E_ALLOW_DESTRUCTIVE_RESET: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start infrastructure
        run: docker compose -f compose.dev.yml up -d --wait postgres redis

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build application
        run: bun run build

      - name: Run migrations
        run: bun run db:migrate

      - name: Start application
        run: nohup bun run start > app.log 2>&1 &

      - name: Wait for application to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/login >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Application did not become ready in time"
          cat app.log
          exit 1

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Debug app log on failure
        if: failure()
        run: cat app.log

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

      - name: Stop infrastructure
        if: always()
        run: docker compose -f compose.dev.yml down -v
